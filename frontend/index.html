<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Amplifier Operator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mini Amplifier</p>
          <h1>Operator</h1>
        </div>
        <div class="toolbar-actions">
          <button id="refresh-data" class="open-button" type="button" title="Reload local logs and roadmaps from this repository.">
            <span aria-hidden="true">↻</span>
            <span>Refresh local data</span>
          </button>
        </div>
      </header>

      <section class="summary-strip" aria-label="Run summary">
        <div>
          <span class="metric" id="run-count">0</span>
          <span class="metric-label">runs</span>
        </div>
        <div>
          <span class="metric" id="error-count">0</span>
          <span class="metric-label">errors</span>
        </div>
        <div>
          <span class="metric" id="step-count">0</span>
          <span class="metric-label">steps</span>
        </div>
        <div>
          <span class="metric" id="roadmap-count">0</span>
          <span class="metric-label">roadmaps</span>
        </div>
      </section>

      <details class="collapsible-section runs-section" open>
        <summary class="collapsible-heading">
          <span>Runs</span>
          <span class="collapse-hint">Toggle</span>
        </summary>
        <section class="workspace">
          <aside class="run-list-panel" aria-label="Workflow logs">
            <div id="run-list" class="run-list empty">
              <p>No logs loaded.</p>
            </div>
            <div id="error-list" class="error-list" aria-live="polite"></div>
          </aside>

          <section class="inspector" aria-label="Run inspector">
            <div id="inspector-empty" class="empty-state">
              <p>No run selected.</p>
            </div>
            <article id="inspector" class="inspector-body" hidden></article>
          </section>
        </section>
      </details>

      <details class="roadmap-authoring collapsible-section" open>
        <summary class="collapsible-heading">
          <span>Roadmap Draft</span>
          <span class="collapse-hint">Toggle</span>
        </summary>
        <form id="roadmap-draft-form" class="draft-form">
          <label>
            <span>Title</span>
            <input name="title" type="text" value="Next Roadmap: Operator Control">
          </label>
          <label>
            <span>Goal</span>
            <textarea name="goal" rows="3">Build local operator controls.</textarea>
          </label>
          <label>
            <span>Status</span>
            <select name="status">
              <option>Not started.</option>
              <option>In progress.</option>
              <option>Completed.</option>
            </select>
          </label>
          <label>
            <span>Principles</span>
            <textarea name="principles" rows="4">Draft first.
Validate before save.</textarea>
          </label>
          <label>
            <span>Sequence</span>
            <textarea name="sequence" rows="4">Add a local roadmap authoring UI.</textarea>
          </label>
          <label>
            <span>Acceptance Criteria</span>
            <textarea name="acceptanceCriteria" rows="4">Operators can create an in-browser draft without writing files.</textarea>
          </label>
          <label>
            <span>Out Of Scope</span>
            <textarea name="outOfScope" rows="4">Writing roadmap files.</textarea>
          </label>
          <button class="open-button" type="submit">Review draft</button>
        </form>
      </details>

      <dialog id="roadmap-review-modal" class="review-modal" aria-labelledby="roadmap-review-title">
        <article class="review-dialog">
          <header class="review-header">
            <div>
              <p class="eyebrow">Roadmap Review</p>
              <h2 id="roadmap-review-title">Review Draft</h2>
            </div>
            <button id="roadmap-review-close" class="open-button secondary compact" type="button">Close</button>
          </header>
          <div id="roadmap-review-body" class="review-body" aria-live="polite"></div>
        </article>
      </dialog>

      <details class="roadmap-dashboard collapsible-section" open>
        <summary class="collapsible-heading">
          <span>Roadmaps</span>
          <span class="collapse-hint">Toggle</span>
        </summary>
        <div id="roadmap-list" class="roadmap-list empty">
          <p>No roadmaps loaded.</p>
        </div>
        <div id="roadmap-error-list" class="error-list" aria-live="polite"></div>
      </details>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

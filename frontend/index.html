<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Amplifier Operator</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Mini Amplifier</p>
          <h1>Operator</h1>
        </div>
        <div class="toolbar-actions">
          <label class="open-button" for="log-files" title="Open workflow log JSON files">
            <span aria-hidden="true">+</span>
            <span>Open logs</span>
          </label>
          <label class="open-button secondary" for="roadmap-files" title="Open roadmap markdown files">
            <span aria-hidden="true">+</span>
            <span>Open roadmaps</span>
          </label>
        </div>
        <input id="log-files" type="file" accept=".json,application/json" multiple webkitdirectory>
        <input id="roadmap-files" type="file" accept=".md,text/markdown,text/plain" multiple webkitdirectory>
      </header>

      <section class="summary-strip" aria-label="Run summary">
        <div>
          <span class="metric" id="run-count">0</span>
          <span class="metric-label">runs</span>
        </div>
        <div>
          <span class="metric" id="error-count">0</span>
          <span class="metric-label">errors</span>
        </div>
        <div>
          <span class="metric" id="step-count">0</span>
          <span class="metric-label">steps</span>
        </div>
        <div>
          <span class="metric" id="roadmap-count">0</span>
          <span class="metric-label">roadmaps</span>
        </div>
      </section>

      <section class="workspace">
        <aside class="run-list-panel" aria-label="Workflow logs">
          <div class="panel-heading">
            <h2>Runs</h2>
          </div>
          <div id="run-list" class="run-list empty">
            <p>No logs loaded.</p>
          </div>
          <div id="error-list" class="error-list" aria-live="polite"></div>
        </aside>

        <section class="inspector" aria-label="Run inspector">
          <div id="inspector-empty" class="empty-state">
            <p>No run selected.</p>
          </div>
          <article id="inspector" class="inspector-body" hidden></article>
        </section>
      </section>

      <section class="roadmap-dashboard" aria-label="Roadmap dashboard">
        <div class="panel-heading">
          <h2>Roadmaps</h2>
        </div>
        <div id="roadmap-list" class="roadmap-list empty">
          <p>No roadmaps loaded.</p>
        </div>
        <div id="roadmap-error-list" class="error-list" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

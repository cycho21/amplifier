workflow: invalid-duplicate-step-workflow

description: Invalid workflow fixture with duplicate step ids.

mode: sequential

input:
  - tasks/{task_id}.md

steps:
  - id: implementer
    role: implementer
    agent_role: agents/implementer.md
    execution_spec: execution/implementer.yaml
    task_id: "{task_id}"
    depends_on: []

  - id: implementer
    role: reviewer
    agent_role: agents/reviewer.md
    execution_spec: execution/reviewer.yaml
    task_id: "{task_id}"
    depends_on: []

output:
  - workflow_summary
  - step_logs
  - final_status
  - risks
  - next_steps

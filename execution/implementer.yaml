role: implementer

# Provider selection: dry-run | codex | claude
# Defaults to dry-run if not specified
provider: dry-run

# Provider-specific configuration
provider_config:
  codex:
    model: "gpt-4"  # OpenAI models: gpt-4, gpt-3.5-turbo, codex-mini-latest, gpt-5.5
    timeout: 600
    max_tokens: 8000
  claude:
    model: "claude-sonnet-4-5"
    timeout: 600
    max_tokens: 8000

input:
  - docs/plan/PLAN.md
  - docs/plan/CONTRACT.md
  - agents/implementer.md
  - tasks/{task_id}.md

instructions:
  - Follow task requirements exactly.
  - Modify only files allowed by the task.
  - Keep changes minimal.
  - Do not refactor unrelated code or documents.
  - Run the narrowest relevant verification command when possible.
  - Report risks and incomplete work explicitly.

output:
  - summary
  - changed_files
  - verification_result
  - risks
  - next_steps

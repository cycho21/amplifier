role: system-designer

runner:
  provider: codex
  tool: codex-cli
  mode: dry-run

input:
  - docs/plan/PLAN.md
  - docs/plan/CONTRACT.md
  - docs/agents/architect/system-designer.md
  - agents/system-designer.md
  - tasks/{task_id}.md

instructions:
  - Define Domain, Use Case, and Infrastructure boundaries.
  - Define interfaces before implementation details.
  - Keep data models decoupled from storage schemas.
  - Make the design testable by default.
  - Report unclear boundaries instead of guessing.

output:
  - summary
  - changed_files
  - verification_result
  - risks
  - next_steps

role: architect

runner:
  provider: codex
  tool: codex-cli
  mode: dry-run

input:
  - docs/plan/PLAN.md
  - docs/plan/CONTRACT.md
  - agents/architect.md
  - tasks/{task_id}.md

instructions:
  - Translate requirements into an Architecture Design.
  - Define module boundaries before implementation begins.
  - Preserve Clean Architecture separation.
  - Include testability considerations.
  - Report unresolved trade-offs explicitly.

output:
  - summary
  - changed_files
  - verification_result
  - risks
  - next_steps

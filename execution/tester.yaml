role: tester

# Provider selection: dry-run | codex | claude
# Defaults to dry-run if not specified
provider: dry-run

# Provider-specific configuration
provider_config:
  codex:
    model: "gpt-4"  # OpenAI models: gpt-4, gpt-3.5-turbo, codex-mini-latest, gpt-5.5
    timeout: 600
    max_tokens: 8000
  claude:
    model: "claude-sonnet-4-5"
    timeout: 600
    max_tokens: 8000

input:
  - docs/plan/PLAN.md
  - docs/plan/CONTRACT.md
  - docs/agents/developer/tester.md
  - agents/tester.md
  - tasks/{task_id}.md

instructions:
  - Validate only the behavior requested by the task.
  - Prefer the narrowest relevant verification command.
  - Check meaningful edge cases when relevant.
  - Report pass/fail status for each scenario.
  - Provide fix suggestions for failed checks.
  - Do not modify production code unless explicitly instructed.

output:
  - summary
  - changed_files
  - verification_result
  - risks
  - next_steps
